services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crypto_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/crypto_app
      JWT_SECRET: ${JWT_SECRET:-crypto-vault-jwt-secret-docker}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-crypto-vault-refresh-docker}
      COINGECKO_API_URL: https://api.coingecko.com/api/v3
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
    ports:
      - "4000:4000"
    command: >
      sh -c "npx prisma migrate deploy && node dist/index.js"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"

volumes:
  pgdata:
